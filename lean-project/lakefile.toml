# Leibniz R1 Lean environment. Core Lean 4 only for R1a; Mathlib is added as a
# dependency in R1b (analysis-of-algorithms statements need it). Pinned toolchain
# lives in `lean-toolchain` (leanprover/lean4:v4.31.0).
name = "leibniz_lean"
version = "0.1.0"
defaultTargets = ["LeibnizLean"]

[[lean_lib]]
name = "LeibnizLean"
