# Leibniz R1 Lean environment. R1b adds Mathlib (analysis-of-algorithms statements
# need it) pinned to the tag matching the toolchain in `lean-toolchain`
# (leanprover/lean4:v4.31.0). Oleans come prebuilt via `lake exe cache get`.
name = "leibniz_lean"
version = "0.1.0"
defaultTargets = ["LeibnizLean"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.31.0"

[[lean_lib]]
name = "LeibnizLean"
