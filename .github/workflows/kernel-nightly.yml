name: kernel-nightly

# Docker-gated render->kernel tests that the main `ci` lane CANNOT run: GitHub-hosted runners have no
# Lean image, and there is no in-repo Dockerfile (the `leibniz-lean` image is operator-local). So this
# lane targets a SELF-HOSTED runner labelled `lean` that has docker + the image. It runs nightly and on
# demand. If no such runner is registered, the scheduled job simply does not run — it never reports a
# false green. scripts/run_kernel_tests.sh fails loudly if the image is absent or a kernel test skips.

on:
  schedule:
    - cron: "0 7 * * *"   # ~07:00 UTC nightly
  workflow_dispatch: {}

jobs:
  kernel:
    runs-on: [self-hosted, lean]   # register a self-hosted runner (label `lean`) with docker + leibniz-lean
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (dev extra adds pytest)
        run: python3 -m pip install -e ".[dev]"
      - name: Kernel lane — render->kernel tests on the real Lean kernel (no silent skip)
        run: bash scripts/run_kernel_tests.sh
