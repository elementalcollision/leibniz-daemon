# Safety-net rebuild. The Leibniz-side push-triggered notify workflow is the
# primary trigger; this catches anything missed by rebuilding once a day. Costs 1
# Cloudflare build/day — negligible against the 500/mo free allowance. Requires
# the repo secret CF_DEPLOY_HOOK (see DEPLOY.md).
name: Daily rebuild

on:
  schedule:
    - cron: "23 5 * * *" # 05:23 UTC daily
  workflow_dispatch: {}

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cloudflare Pages deploy hook
        env:
          HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::CF_DEPLOY_HOOK is not set yet; skipping until Cloudflare is wired."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" -o /dev/null -w "deploy hook → HTTP %{http_code}\n"
